<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Book Appointment - Salon Scheduler</title>
    <script src="https://unpkg.com/alpinejs" defer></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="js/api.js"></script>
</head>
<body class="bg-gray-50">
    <div x-data="bookingForm()" x-init="init()" class="min-h-screen">
        <!-- Header -->
        <header class="bg-white shadow-sm">
            <nav class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
                <div class="flex justify-between h-16">
                    <div class="flex items-center">
                        <a href="index.html" class="text-xl font-semibold text-gray-800">
                            Salon Scheduler
                        </a>
                    </div>
                </div>
            </nav>
        </header>

        <!-- Main Content -->
        <main class="max-w-3xl mx-auto px-4 py-8">
            <!-- Progress Steps -->
            <div class="mb-8">
                <div class="flex items-center justify-center space-x-4">
                    <template x-for="(step, index) in steps" :key="index">
                        <div class="flex items-center">
                            <div :class="`rounded-full h-8 w-8 flex items-center justify-center ${currentStep > index ? 'bg-blue-600 text-white' : currentStep === index ? 'bg-blue-100 text-blue-600 border-2 border-blue-600' : 'bg-gray-200 text-gray-600'}`">
                                <span x-text="index + 1"></span>
                            </div>
                            <div x-show="index < steps.length - 1" class="h-1 w-12 mx-2" :class="currentStep > index ? 'bg-blue-600' : 'bg-gray-200'"></div>
                        </div>
                    </template>
                </div>
                <div class="text-center mt-2">
                    <span class="text-gray-700 font-medium" x-text="steps[currentStep]"></span>
                </div>
            </div>

            <!-- Booking Forms -->
            <div class="bg-white rounded-lg shadow-md p-6">
            <div x-show="loading" class="text-center mb-4">
                <span class="text-blue-600">Loading...</span>
            </div>
            
            <div x-show="error" class="bg-red-100 border border-red-400 text-red-700 px-4 py-3 rounded mb-4">
                <span x-text="error"></span>
            </div>
                <!-- Step 1: Service Selection -->
                <div x-show="currentStep === 0">
                    <h2 class="text-xl font-semibold mb-4">Select a Service</h2>
                    <div class="grid gap-4 md:grid-cols-2">
                        <template x-for="service in services" :key="service.id">
                            <button
                                @click="selectService(service)"
                                :class="`p-4 border rounded-lg text-left transition-colors ${selectedService?.id === service.id ? 'border-blue-600 bg-blue-50' : 'hover:border-gray-400'}`">
                                <div class="font-medium" x-text="service.name"></div>
                                <div class="text-sm text-gray-600">
                                    <span x-text="formatPrice(service.price)"></span> •
                                    <span x-text="`${service.duration} min`"></span>
                                </div>
                            </button>
                        </template>
                    </div>
                </div>

                <!-- Step 2: Date & Time Selection -->
                <div x-show="currentStep === 1">
                    <h2 class="text-xl font-semibold mb-4">Choose Date & Time</h2>
                    <div class="grid gap-6 md:grid-cols-2">
                        <!-- Date Picker -->
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-2">Select Date</label>
                            <input
                                type="date"
                                x-model="selectedDate"
                                :min="minDate"
                                @change="dateChanged()"
                                class="w-full border-gray-300 rounded-md shadow-sm focus:ring-blue-500 focus:border-blue-500">
                        </div>
                        <!-- Time Slots -->
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-2">Available Times</label>
                            <div class="grid grid-cols-2 gap-2">
                                <template x-for="time in availableTimeSlots" :key="time">
                                    <button
                                        @click="selectTimeSlot(time)"
                                        :class="`py-2 px-4 border rounded-md ${selectedTime === time ? 'bg-blue-600 text-white' : 'hover:bg-gray-50'}`"
                                        x-text="formatTime(time)">
                                    </button>
                                </template>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Step 3: Client Information -->
                <div x-show="currentStep === 2">
                    <h2 class="text-xl font-semibold mb-4">Your Information</h2>
                    <div class="mb-4">
                        <button 
                            type="button"
                            @click="showExistingClientSearch = true"
                            class="text-blue-600 hover:text-blue-800">
                            Already a client? Click here to search
                        </button>
                        
                        <div x-show="showExistingClientSearch" class="mt-4 p-4 border rounded-md">
                            <div class="mb-4">
                                <label class="block text-sm font-medium text-gray-700">Search by Email or Name</label>
                                <input 
                                    type="text" 
                                    x-model="clientSearch" 
                                    @input="searchClients()"
                                    placeholder="Enter email or name"
                                    class="mt-1 block w-full border-gray-300 rounded-md shadow-sm focus:ring-blue-500 focus:border-blue-500">
                            </div>
                            
                            <div x-show="searchResults.length > 0" class="mt-2">
                                <template x-for="client in searchResults" :key="client.id">
                                    <div 
                                        @click="selectExistingClient(client)"
                                        class="cursor-pointer p-2 hover:bg-blue-50 border-b">
                                        <p class="font-medium" x-text="client.name"></p>
                                        <p class="text-sm text-gray-600" x-text="client.email"></p>
                                    </div>
                                </template>
                            </div>
                        </div>
                    </div>
                    <form @submit.prevent="submitBooking" class="space-y-4">
                        <div class="grid gap-4 md:grid-cols-2">
                            <div>
                                <label class="block text-sm font-medium text-gray-700">Full Name</label>
                                <input type="text" x-model="clientInfo.name" required
                                    class="mt-1 block w-full border-gray-300 rounded-md shadow-sm focus:ring-blue-500 focus:border-blue-500">
                            </div>
                            <div>
                                <label class="block text-sm font-medium text-gray-700">Email</label>
                                <input type="email" x-model="clientInfo.email" required
                                    class="mt-1 block w-full border-gray-300 rounded-md shadow-sm focus:ring-blue-500 focus:border-blue-500">
                            </div>
                            <div>
                                <label class="block text-sm font-medium text-gray-700">Phone</label>
                                <input type="tel" x-model="clientInfo.phone" required
                                    class="mt-1 block w-full border-gray-300 rounded-md shadow-sm focus:ring-blue-500 focus:border-blue-500">
                            </div>
                            <div>
                                <label class="block text-sm font-medium text-gray-700">Notes (Optional)</label>
                                <textarea x-model="clientInfo.notes"
                                    class="mt-1 block w-full border-gray-300 rounded-md shadow-sm focus:ring-blue-500 focus:border-blue-500"></textarea>
                            </div>
                        </div>
                    </form>
                </div>
            </div>

            <!-- Navigation Buttons -->
            <div class="mt-6 flex justify-between">
                <button
                    x-show="currentStep > 0"
                    @click="previousStep"
                    class="px-4 py-2 border border-gray-300 rounded-md text-gray-700 hover:bg-gray-50">
                    Back
                </button>
                <button
                    x-show="currentStep < steps.length - 1"
                    @click="nextStep"
                    :disabled="!canProceed"
                    :class="`px-4 py-2 rounded-md text-white ${canProceed ? 'bg-blue-600 hover:bg-blue-700' : 'bg-gray-400'}`">
                    Continue
                </button>
                <button
                    x-show="currentStep === steps.length - 1"
                    @click="submitBooking"
                    class="px-4 py-2 bg-blue-600 text-white rounded-md hover:bg-blue-700">
                    Confirm Booking
                </button>
            </div>
        </main>
    </div>

    <script>
        function bookingForm() {
        return {
            steps: ['Select Service', 'Choose Date & Time', 'Your Information'],
            currentStep: 0,
            businessId: 1, // Default business ID - could be passed as URL parameter
            services: [],
            selectedService: null,
            selectedDate: new Date().toISOString().split('T')[0],
            availableTimeSlots: [],
            selectedTime: null,
            clientInfo: {
                name: '',
                email: '',
                phone: '',
                notes: ''
            },
            loading: false,
            error: null,
    
            // Initialize the form
            async init() {
                try {
                    // Fetch the business data first
                    const business = await getBusiness(this.businessId);
                    console.log('Business loaded:', business);
                    
                    // Then fetch services for this business
                    await this.fetchServices();
                } catch (error) {
                    this.error = `Failed to load data: ${error.message}`;
                    console.error('Error initializing booking form:', error);
                }
            },
    
            async fetchServices() {
                try {
                    this.loading = true;
                    this.services = await getServices(this.businessId);
                    this.loading = false;
                    console.log('Services loaded:', this.services);
                } catch (error) {
                    this.loading = false;
                    this.error = `Failed to load services: ${error.message}`;
                    console.error('Error fetching services:', error);
                }
            },
    
            async fetchAvailableSlots() {
                if (!this.selectedService || !this.selectedDate) return;
                
                try {
                    this.loading = true;
                    const response = await getAvailableSlots(this.selectedService.id, this.selectedDate);
                    this.availableTimeSlots = response.slots || [];
                    this.loading = false;
                    console.log('Available slots loaded:', this.availableTimeSlots);
                } catch (error) {
                    this.loading = false;
                    this.error = `Failed to load available times: ${error.message}`;
                    console.error('Error fetching time slots:', error);
                }
            },
    
            selectService(service) {
                this.selectedService = service;
                this.selectedTime = null; // Reset time selection
                
                // When a new service is selected, fetch available time slots
                if (this.selectedDate) {
                    this.fetchAvailableSlots();
                }
            },
    
            async dateChanged() {
                this.selectedTime = null; // Reset time selection
                await this.fetchAvailableSlots();
            },
    
            selectTimeSlot(time) {
                this.selectedTime = time;
            },
    
            get minDate() {
                return new Date().toISOString().split('T')[0];
            },
    
            get canProceed() {
                switch (this.currentStep) {
                    case 0:
                        return this.selectedService !== null;
                    case 1:
                        return this.selectedDate && this.selectedTime;
                    case 2:
                        return this.clientInfo.name && this.clientInfo.email && this.clientInfo.phone;
                    default:
                        return false;
                }
            },
    
            formatPrice(price) {
                return new Intl.NumberFormat('en-US', {
                    style: 'currency',
                    currency: 'USD'
                }).format(price);
            },
    
            formatTime(time) {
                return new Date(`2000-01-01T${time}`).toLocaleTimeString('en-US', {
                    hour: 'numeric',
                    minute: '2-digit',
                    hour12: true
                });
            },
    
            nextStep() {
                if (this.canProceed && this.currentStep < this.steps.length - 1) {
                    this.currentStep++;
                    
                    // If moving to time selection step, fetch available times
                    if (this.currentStep === 1 && this.selectedService) {
                        this.fetchAvailableSlots();
                    }
                }
            },
    
            previousStep() {
                if (this.currentStep > 0) {
                    this.currentStep--;
                }
            },
    
            async submitBooking() {
                if (!this.canProceed) return;
                
                try {
                    this.loading = true;
                    
                    // First, create or get client
                    let clientId;
                    try {
                        // Check if client already exists by email
                        const clients = await getClients();
                        const existingClient = clients.find(client => 
                            client.email.toLowerCase() === this.clientInfo.email.toLowerCase()
                        );
                        
                        if (existingClient) {
                            clientId = existingClient.id;
                            console.log('Using existing client:', existingClient);
                        } else {
                            // Create client with the provided information
                            const clientData = {
                                name: this.clientInfo.name,
                                email: this.clientInfo.email,
                                phone: this.clientInfo.phone,
                                notes: this.clientInfo.notes || ''
                            };
                            
                            const newClient = await createClient(clientData);
                            clientId = newClient.id;
                            console.log('Client created:', newClient);
                        }
                    } catch (error) {
                        this.loading = false;
                        this.error = `Failed to process client information: ${error.message}`;
                        console.error('Error processing client:', error);
                        return;
                    }
                    
                    // Calculate end time based on service duration and start time
                    const [hours, minutes] = this.selectedTime.split(':').map(Number);
                    const startDate = new Date();
                    startDate.setHours(hours, minutes, 0);
                    
                    const endDate = new Date(startDate);
                    endDate.setMinutes(endDate.getMinutes() + this.selectedService.duration);
                    
                    const endTime = `${endDate.getHours().toString().padStart(2, '0')}:${endDate.getMinutes().toString().padStart(2, '0')}`;
                    
                    // Create appointment data object
                    const appointmentData = {
                        business_id: this.businessId,
                        service_id: this.selectedService.id,
                        client_id: clientId,
                        staff_id: 1, // This would ideally be selected or assigned
                        date: this.selectedDate,
                        start_time: this.selectedTime,
                        end_time: endTime,
                        notes: this.clientInfo.notes || ''
                    };
                    
                    console.log('Submitting appointment:', appointmentData);
                    
                    // Send to API
                    const result = await createAppointment(appointmentData);
                    
                    this.loading = false;
                    
                    // Show success message and redirect to confirmation page
                    alert('Appointment booked successfully!');
                    window.location.href = 'confirmation.html?id=' + result.id;
                    
                } catch (error) {
                    this.loading = false;
                    this.error = `Failed to book appointment: ${error.message}`;
                    console.error('Error booking appointment:', error);
                    alert('There was a problem booking your appointment. Please try again.');
                }
            }
        };
    }
    </script>
</body>
</html>
